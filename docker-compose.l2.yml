# =============================================================================
# Phase 3 — L2 + STARK proof pipeline.
#
# Extends docker-compose.l1.yml. Bring up:
#
#   docker compose -f docker-compose.l1.yml -f docker-compose.l2.yml up -d
#
# Service profiles (control which subset starts):
#   default profile         prover-api only — Phase 3.a, direct cairo-run
#   `l2` profile            + madara + pathfinder — Phase 3.b, real L2 stack
#   `proving` profile       + snos — full SNOS-driven proof pipeline
#
# Phase 3.a (default profile, what works today):
#   prover-api  →  cairo-compile + cairo-run + cpu_air_prover +
#                 cpu_air_verifier + stark_evm_adapter + Verifier.registerSafeProof
#                 against ship-a's chain. No Madara needed.
#
# Phase 3.b (l2 profile, in flight):
#   madara       Cairo-1 sequencer hosting convoy_protocol.cairo. Settles
#                into the StarknetCoreStub already deployed in Phase 2 at
#                0x5FbDB2315678afecb367f032d93F642f64180aa3.
#   pathfinder   Independent full-node + JSON-RPC; archive-mode state
#                tries so SNOS can replay arbitrary blocks.
#
# Phase 3.c (proving profile, post-Madara):
#   snos         StarkNet OS — replays an L2 block into a PIE the prover
#                consumes. Uses Karnot's tx-hash patches kept verbatim.
# =============================================================================

services:

  # ═══ Phase 3.a — direct STARK prover (no Madara) ═══════════════════════
  prover-api:
    build:
      # Build context is the repo root so the Dockerfile's Stage 1 can
      # reach infrastructure/bootloader-cli/ and vendor/cairo-bootloader/
      # to compile the convoy-bootloader-cli binary.
      context: .
      dockerfile: infrastructure/prover-api/Dockerfile
    image: convoy-prover-api:latest
    container_name: convoy-prover-api
    depends_on:
      ship-a:
        condition: service_healthy
    volumes:
      - prover-output:/proofs
    environment:
      STONE_OUTPUT_DIR:  /proofs
      # ── Stage B (submit_proof_l1.py against the convoy Verifier) ─────
      GETH_RPC_URL:      http://ship-a:8545
      # Convoy contracts — addresses captured from
      # deployments/local.env after the 2026-05-30 clean-chain re-deploy.
      # Stable across re-deploys ONLY because the deployer nonce sequence
      # and StarkWare deploy order are deterministic.
      VERIFIER_ADDR:     "0x3aa5ebb10dc797cac828524e59a333d0a371443c"
      REGISTRY_ADDR:     "0x68b1d87f95878fe05b998f19b66f4baba5de1aed"
      ALPHA_RELAY_PK:    "0x8b3a350cf5c34c9194ca85829a2df0ec3153be0318b5e2d3348e872092edffba"
      BRAVO_RELAY_PK:    "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      # ── StarkWare stack (clean chain, on-demand sealing era) ────────
      URL:                              http://ship-a:8545
      PRIVATE_KEY:                      "0x8b3a350cf5c34c9194ca85829a2df0ec3153be0318b5e2d3348e872092edffba"
      MERKLE_STATEMENT_CONTRACT_ADDR:   "0xa51c1fc2f0d1a1b8494ed1fe312d7c3a78ed91c0"
      FRI_STATEMENT_CONTRACT_ADDR:      "0x0dcd1bf9a1b36ce34237eeafef220932846bcd82"
      MEMORY_PAGE_FACT_REGISTRY_ADDR:   "0xb7f8bc63bbcad18155201308c8f3540b07f84f5e"
      GPS_STATEMENT_VERIFIER_ADDR:      "0x959922be3caee4b8cd9a407cc3ac1c251c2007b1"
    networks:
      - convoy-l1
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 6G

  # ═══ Phase 3.b — Madara L2 sequencer ═══════════════════════════════════
  # Same image + flags as verifiable_grid's madara service. Settles into
  # the existing StarknetCoreStub at the deterministic anvil[0]+nonce0 address
  # (0x5FbDB2315678afecb367f032d93F642f64180aa3 — see DeployL1.s.sol log).
  madara:
    image: ghcr.io/madara-alliance/madara:nightly
    container_name: convoy-madara
    profiles: ["l2", "proving"]
    depends_on:
      ship-a:
        condition: service_healthy
    volumes:
      - madara-data:/madara_db
    command: >
      --name Madara
      --devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_devnet,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --rpc-external
      --rpc-cors all
      --feeder-gateway-enable
      --gateway-external
      --gateway-port 8080
      --l1-sync-disabled
      --no-transaction-validation
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports:
      # Host ports remapped because verifiable_grid's madara-node may
      # already hold 9944/8080. Pathfinder & SNOS consume these via the
      # convoy-l1 docker network (http://convoy-madara:9944 / :8080),
      # so the host mapping is for human inspection only.
      - "19944:9944"  # StarkNet JSON-RPC v0.7  (host:19944)
      - "18080:8080"  # feeder-gateway          (host:18080)
    networks:
      - convoy-l1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ═══ Pathfinder — independent indexer ═════════════════════════════════
  pathfinder:
    # Pinned to v0.21.3 — same version verifiable_grid uses, known compat
    # with madara :nightly + vg-snos. v0.22.3 serves /rpc/v0_10 which SNOS
    # rpc-replay needs, but vg's working path goes through their
    # orchestrator (vg-orchestrator + MongoDB + mock-atlantic), which
    # mediates the SNOS calls and doesn't need v0_10 directly.
    image: eqlabs/pathfinder:v0.21.3
    container_name: convoy-pathfinder
    profiles: ["l2", "proving"]
    depends_on:
      ship-a:
        condition: service_healthy
      madara:
        condition: service_healthy
    volumes:
      - pathfinder-data:/usr/share/pathfinder/data
    environment:
      RUST_LOG: info
    command: >
      --network custom
      --chain-id convoy_devnet
      --ethereum.url ws://ship-a:8546
      --gateway-url http://convoy-madara:8080/gateway
      --feeder-gateway-url http://convoy-madara:8080/feeder_gateway
      --storage.state-tries archive
      --data-directory /usr/share/pathfinder/data
    ports:
      - "9545:9545"
    networks:
      - convoy-l1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9545'"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s

  # ═══ Phase 3.c — SNOS PIE generator (standalone, dev-only) ═══════════
  # Replays a Madara block in the Cairo VM, emits a PIE the prover consumes.
  # Useful as a standalone smoke test; the production-shape pipeline uses
  # the orchestrator below (which calls SNOS through MongoDB jobs).
  snos:
    build:
      context: ./infrastructure/snos
      dockerfile: Dockerfile
    image: convoy-snos:latest
    container_name: convoy-snos
    profiles: ["proving-direct"]
    depends_on:
      pathfinder:
        condition: service_healthy
    volumes:
      - snos-output:/output
      - ./infrastructure/snos/entrypoint.sh:/app/entrypoint.sh:ro
    environment:
      SNOS_BLOCK_NUMBER: 1                    # which L2 block to prove
      SNOS_RPC_URL:      http://convoy-pathfinder:9545
      SNOS_GATEWAY_URL:  http://convoy-madara:8080
      SNOS_OUTPUT_DIR:   /output
    networks:
      - convoy-l1

  # ═══ Phase 3.c — verifiable_grid-style orchestrator stack ════════════
  # MongoDB stores orchestrator job state; LocalStack mocks AWS S3/SQS/SNS;
  # vg-orchestrator pulls Madara blocks, calls SNOS to replay, calls a
  # mocked Atlantic prover service, and writes verdicts back to L1.
  # Same image + flags verifiable_grid uses, with addresses pointed at
  # OUR Phase 2 chain (Verifier at 0x9fE4…6e0).
  mongo:
    image: mongo:7
    container_name: convoy-mongo
    profiles: ["proving"]
    command: ["mongod"]
    networks:
      - convoy-l1
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  localstack:
    image: localstack/localstack:3
    container_name: convoy-localstack
    profiles: ["proving"]
    environment:
      # Orchestrator needs scheduler (EventBridge) for periodic worker
      # triggers; iam for role creation; events for the rule path.
      SERVICES: s3,sqs,sns,iam,events,scheduler,sts
      DEFAULT_REGION: us-east-1
      EDGE_PORT: 4566
      LOCALSTACK_HOST: convoy-localstack:4566
      SQS_ENDPOINT_STRATEGY: path
    networks:
      - convoy-l1
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  orchestrator:
    # Official Madara modular orchestrator from the upstream ecosystem
    # (ghcr.io/madara-alliance/orchestrator). Same binary verifiable_grid
    # uses a fork of, but pulled directly from upstream so we get whatever
    # the modular stack ships today.
    image: ghcr.io/madara-alliance/orchestrator:nightly
    container_name: convoy-orchestrator
    profiles: ["proving"]
    depends_on:
      ship-a:
        condition: service_healthy
      madara:
        condition: service_healthy
      pathfinder:
        condition: service_healthy
      mongo:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://convoy-localstack:4566
      # Verbose so we can see why SnosBatching's eligibility filter
      # rejects blocks we expect to be batchable.
      RUST_LOG: "debug,hyper=info,reqwest=info,aws_smithy=info,h2=info,tower=info"
    # The orchestrator command is taken verbatim from verifiable_grid
    # (docker inspect madara-orchestrator), with these substitutions for
    # OUR chain:
    #   --ethereum-rpc-url            ship-a (was geth-node1)
    #   --l1-core-contract-address    Verifier (0x9fE4…6e0; we don't have a
    #                                  StarknetCore on L1, so point this at
    #                                  the Verifier — orchestrator will
    #                                  call updateState() which is a no-op
    #                                  on our Verifier ABI but writes the
    #                                  fact via registerFact's mock path).
    #   --atlantic-mock-fact-hash     true (no real Atlantic key available)
    #   --mock-atlantic-server        true (local Stone-emulating mock)
    # Same flag pattern verifiable_grid uses, ported to the upstream
    # ghcr.io/madara-alliance/orchestrator:nightly binary's CLI:
    #   --prover atlantic + --mock-atlantic-server runs the Atlantic
    #   pipeline against a local mock server (no cloud key needed).
    #   For real Stone STARKs against L2 blocks you'd swap to a real
    #   Atlantic/SHARP API key.
    command:
      - run
      - --aws
      - --aws-s3
      - --aws-sqs
      - --aws-sns
      - --mongodb
      - --mongodb-connection-url
      - mongodb://convoy-mongo:27017
      - --mongodb-database-name
      - orchestrator
      - --settle-on-ethereum
      - --da-on-ethereum
      - --ethereum-rpc-url
      - http://ship-a:8545
      - --ethereum-da-rpc-url
      - http://ship-a:8545
      - --ethereum-private-key
      - ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - --l1-core-contract-address
      - "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      - --starknet-operator-address
      - "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      # `--prover mock` skips the Atlantic HTTP API entirely (no create_bucket
      # call, no /atlantic-query polling). The proving job completes
      # synchronously with a mock proof. The Atlantic-* flags below are
      # required by the CLI parser even though they're unused.
      - --prover
      - mock
      - --atlantic-api-key
      - mock
      - --atlantic-service-url
      - http://localhost:4001
      - --atlantic-rpc-node-url
      - http://convoy-pathfinder:9545
      - --atlantic-prover-type
      - stone
      - --atlantic-settlement-layer
      - ethereum
      - --atlantic-verifier-contract-address
      - "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
      - --atlantic-verifier-cairo-vm
      - rust
      - --atlantic-verifier-result
      - proof-generation
      - --atlantic-network
      - TESTNET
      - --atlantic-mock-fact-hash
      - "true"
      - --mock-atlantic-server
      - --queue-identifier
      - "mo_{}_queue"
      - --min-block-to-process
      - "1"                       # Madara's block 0 is genesis-pending; start at 1
      - --rpc-for-snos
      - http://convoy-pathfinder:9545
      - --madara-rpc-url
      - http://convoy-madara:9944
      - --madara-feeder-gateway-url
      - http://convoy-madara:8080/feeder_gateway
      # The "still pending" error in replay_bounds.rs comes from this RPC.
      # Pointing it at Madara's JSON-RPC (which reports ACCEPTED_ON_L2 for
      # sealed blocks) lets the orchestrator's batching predicate accept
      # blocks 1..head as eligible for SNOS proving.
      - --replay-bounds-rpc-url
      - http://convoy-madara:9944
      - --max-batch-time-seconds
      - "300"
      - --max-batch-size
      - "10"
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - --admin-enabled
      - --disable-peerdas
    ports:
      - "13000:3000"          # orchestrator API (host:13000)
    networks:
      - convoy-l1
    restart: unless-stopped


volumes:
  prover-output:
    driver: local
  madara-data:
    driver: local
  pathfinder-data:
    driver: local
  snos-output:
    driver: local


# convoy-l1 network is created by docker-compose.l1.yml.
networks:
  convoy-l1:
    external: true
    name: convoy-l1
