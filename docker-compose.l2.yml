# =============================================================================
# Phase 3 — L2 + STARK proof pipeline (initial slice: prover-api only)
#
# This file EXTENDS docker-compose.l1.yml. Bring up:
#
#   docker compose -f docker-compose.l1.yml -f docker-compose.l2.yml up -d
#
# What's in this compose file (Phase 3 minimum vertical slice):
#
#   - prover-api  Stone STARK prover (cpu_air_prover) + stark_evm_adapter +
#                 cairo-lang. Compiles safe_area_verify.cairo, runs it
#                 against /proofs/program_input.json (or sample_input.json
#                 if absent), generates a STARK proof, verifies it locally,
#                 adapts to EVM format, and submits registerSafeProof to
#                 the Verifier contract on ship-a's chain.
#
# What's COMING (separate file, separate work):
#
#   - madara      L2 sequencer (Cairo 1 contracts)        Phase 3.b
#   - pathfinder  StarkNet RPC indexer                    Phase 3.b
#   - snos        StarkNet OS (replays L2 block → PIE)    Phase 3.c
#   - orchestrator  Madara orchestrator (job queue)       Phase 3.d
#
# The current slice proves end-to-end "Cairo program → STARK proof → on-chain
# fact" without involving Madara. Once that works, we layer on Madara/SNOS
# so the proofs come from real L2 block replays instead of direct
# cairo-run.
# =============================================================================

services:

  prover-api:
    build:
      context: ./infrastructure/prover-api
      dockerfile: Dockerfile
    image: convoy-prover-api:latest
    container_name: convoy-prover-api
    depends_on:
      ship-a:
        condition: service_healthy
    volumes:
      - prover-output:/proofs
    environment:
      STONE_OUTPUT_DIR:  /proofs
      GETH_RPC_URL:      http://ship-a:8545
      # Verifier contract address — CREATE deterministic from anvil[0] nonce 2
      # (matches the address printed by DeployL1.s.sol).
      VERIFIER_ADDR:     "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
      # Relay private keys (anvil[1] = ship B = bravo; anvil[5] = ship F = alpha).
      # The submit script picks the right one based on drone_id from the proof
      # public outputs.
      ALPHA_RELAY_PK:    "0x8b3a350cf5c34c9194ca85829a2df0ec3153be0318b5e2d3348e872092edffba"
      BRAVO_RELAY_PK:    "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
    networks:
      - convoy-l1
    # Stone is RAM-bound. 50-cell SAFE proof should peak around 6–8 GB on a
    # starknet_with_keccak layout; 12 GB ceiling gives headroom for bigger
    # mission sizes during demo.
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 6G

volumes:
  prover-output:
    driver: local

# Note: the convoy-l1 network is created by docker-compose.l1.yml.
networks:
  convoy-l1:
    external: true
    name: convoy-l1
