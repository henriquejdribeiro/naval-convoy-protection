# =============================================================================
# Phase 3 — L2 + STARK proof pipeline.
#
# Extends docker-compose.l1.yml. Bring up:
#
#   docker compose -f docker-compose.l1.yml -f docker-compose.l2.yml up -d
#
# Service profiles (control which subset starts):
#   default profile         prover-api only — Phase 3.a, direct cairo-run
#   `l2` profile            + madara + pathfinder — Phase 3.b, real L2 stack
#   `proving` profile       + snos — full SNOS-driven proof pipeline
#
# Phase 3.a (default profile, what works today):
#   prover-api  →  cairo-compile + cairo-run + cpu_air_prover +
#                 cpu_air_verifier + stark_evm_adapter + Verifier.registerSafeProof
#                 against ship-a's chain. No Madara needed.
#
# Phase 3.b (l2 profile, in flight):
#   madara       Cairo-1 sequencer hosting convoy_protocol.cairo. Settles
#                into the StarknetCoreStub already deployed in Phase 2 at
#                0x5FbDB2315678afecb367f032d93F642f64180aa3.
#   pathfinder   Independent full-node + JSON-RPC; archive-mode state
#                tries so SNOS can replay arbitrary blocks.
#
# Phase 3.c (proving profile, post-Madara):
#   snos         StarkNet OS — replays an L2 block into a PIE the prover
#                consumes. Uses Karnot's tx-hash patches kept verbatim.
# =============================================================================

# ─── YAML anchors for drone onboard nodes ───────────────────────────────────
# These root-level keys are extensions (x-*) — Compose ignores them, but
# YAML anchor resolution happens before Compose parses, so `<<: *name`
# inside service definitions below picks up these templates.
#
# Per-swarm drone layout:
#
#   Drone 1 (LEADER) hardware hosts:
#     - the swarm's Madara SEQUENCER (madara-{swarm}, --sequencer/--devnet)
#     - a Pathfinder archive node (pathfinder-{swarm}-1) for SNOS replay
#     - SNOS, orchestrator, prover-api (the proving pipeline)
#     - L1 sync is intentionally on so the leader has settlement awareness
#
#   Drones 2..5 (FOLLOWERS) each host:
#     - one Madara FULL-NODE (madara-{swarm}-{n}, --full mode)
#       that syncs from the swarm's leader sequencer via --gateway-url
#       and runs with --l1-sync-disabled. Followers don't need L1.
#
# Madara docs explicitly endorse `--l1-sync-disabled` for "the full-node
# or gateway presets (sync-only node), but you do not have access to an
# L1 RPC node". This is the idiomatic Madara way to run a drone client.

x-madara-fullnode-alpha-template: &madara-fullnode-alpha-template
  image: ghcr.io/madara-alliance/madara:v0.9.1
  profiles: ["l2", "proving", "proving-direct"]
  depends_on:
    madara-alpha:
      condition: service_healthy
  networks:
    - convoy-l1
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
    interval: 10s
    timeout: 5s
    retries: 15
    start_period: 60s

x-madara-fullnode-bravo-template: &madara-fullnode-bravo-template
  image: ghcr.io/madara-alliance/madara:v0.9.1
  profiles: ["l2", "proving", "proving-direct"]
  depends_on:
    madara-bravo:
      condition: service_healthy
  networks:
    - convoy-l1
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
    interval: 10s
    timeout: 5s
    retries: 15
    start_period: 60s

x-pathfinder-alpha-template: &pathfinder-alpha-template
  image: eqlabs/pathfinder:v0.21.3
  profiles: ["l2", "proving", "proving-direct"]
  depends_on:
    ship-a:
      condition: service_healthy
    madara-alpha:
      condition: service_healthy
  environment:
    RUST_LOG: info
  command: >
    --network custom
    --chain-id convoy_alpha
    --ethereum.url ws://ship-a:8546
    --gateway-url http://convoy-madara-alpha:8080/gateway
    --feeder-gateway-url http://convoy-madara-alpha:8080/feeder_gateway
    --storage.state-tries archive
    --data-directory /usr/share/pathfinder/data
  networks:
    - convoy-l1
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9545'"]
    interval: 10s
    timeout: 5s
    retries: 60
    start_period: 120s

x-pathfinder-bravo-template: &pathfinder-bravo-template
  image: eqlabs/pathfinder:v0.21.3
  profiles: ["l2", "proving", "proving-direct"]
  depends_on:
    ship-a:
      condition: service_healthy
    madara-bravo:
      condition: service_healthy
  environment:
    RUST_LOG: info
  command: >
    --network custom
    --chain-id convoy_bravo
    --ethereum.url ws://ship-a:8546
    --gateway-url http://convoy-madara-bravo:8080/gateway
    --feeder-gateway-url http://convoy-madara-bravo:8080/feeder_gateway
    --storage.state-tries archive
    --data-directory /usr/share/pathfinder/data
  networks:
    - convoy-l1
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9545'"]
    interval: 10s
    timeout: 5s
    retries: 60
    start_period: 120s


services:

  # ═══ Prover-API — per-swarm Stone STARK prover ═════════════════════════
  # The original single prover-api was a Phase 3.a shortcut that bypassed
  # Madara entirely. In the dual-swarm topology each swarm has its own
  # prover so Alpha and Bravo lanes can prove in parallel and remain
  # operationally independent (compromise of one prover doesn't affect
  # the other's verdict).
  #
  # Both consume the same image (built once) and share the L1 settlement
  # addresses, but each owns its own /proofs volume and uses its swarm's
  # relay PK as the L1 signer for Stage A submission.

  prover-api-alpha:
    build:
      context: .
      dockerfile: infrastructure/prover-api/Dockerfile
    image: convoy-prover-api:latest
    container_name: convoy-prover-api-alpha
    labels: { dev.dozzle.group: "Alpha 1 (leader)" }
    depends_on:
      ship-a:
        condition: service_healthy
    volumes:
      - prover-alpha-output:/proofs
    environment:
      STONE_OUTPUT_DIR:  /proofs
      SWARM:             alpha
      # ── Stage B (submit_proof_l1.py against the convoy Verifier) ─────
      GETH_RPC_URL:      http://ship-a:8545
      VERIFIER_ADDR:     "0x3aa5ebb10dc797cac828524e59a333d0a371443c"
      REGISTRY_ADDR:     "0x68b1d87f95878fe05b998f19b66f4baba5de1aed"
      ALPHA_RELAY_PK:    "0x8b3a350cf5c34c9194ca85829a2df0ec3153be0318b5e2d3348e872092edffba"
      BRAVO_RELAY_PK:    "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      # ── Stage A — Alpha lane signs with ALPHA_RELAY (ship F / anvil[5]) ──
      URL:                              http://ship-a:8545
      PRIVATE_KEY:                      "0x8b3a350cf5c34c9194ca85829a2df0ec3153be0318b5e2d3348e872092edffba"
      MERKLE_STATEMENT_CONTRACT_ADDR:   "0xa51c1fc2f0d1a1b8494ed1fe312d7c3a78ed91c0"
      FRI_STATEMENT_CONTRACT_ADDR:      "0x0dcd1bf9a1b36ce34237eeafef220932846bcd82"
      MEMORY_PAGE_FACT_REGISTRY_ADDR:   "0xb7f8bc63bbcad18155201308c8f3540b07f84f5e"
      GPS_STATEMENT_VERIFIER_ADDR:      "0x959922be3caee4b8cd9a407cc3ac1c251c2007b1"
    networks:
      - convoy-l1
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 6G

  prover-api-bravo:
    image: convoy-prover-api:latest        # built once via prover-api-alpha
    container_name: convoy-prover-api-bravo
    labels: { dev.dozzle.group: "Bravo 1 (leader)" }
    depends_on:
      ship-a:
        condition: service_healthy
      prover-api-alpha:                    # ensure image build completes first
        condition: service_started
    volumes:
      - prover-bravo-output:/proofs
    environment:
      STONE_OUTPUT_DIR:  /proofs
      SWARM:             bravo
      GETH_RPC_URL:      http://ship-a:8545
      VERIFIER_ADDR:     "0x3aa5ebb10dc797cac828524e59a333d0a371443c"
      REGISTRY_ADDR:     "0x68b1d87f95878fe05b998f19b66f4baba5de1aed"
      ALPHA_RELAY_PK:    "0x8b3a350cf5c34c9194ca85829a2df0ec3153be0318b5e2d3348e872092edffba"
      BRAVO_RELAY_PK:    "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      # ── Stage A — Bravo lane signs with BRAVO_RELAY (ship B / anvil[1]) ──
      URL:                              http://ship-a:8545
      PRIVATE_KEY:                      "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      MERKLE_STATEMENT_CONTRACT_ADDR:   "0xa51c1fc2f0d1a1b8494ed1fe312d7c3a78ed91c0"
      FRI_STATEMENT_CONTRACT_ADDR:      "0x0dcd1bf9a1b36ce34237eeafef220932846bcd82"
      MEMORY_PAGE_FACT_REGISTRY_ADDR:   "0xb7f8bc63bbcad18155201308c8f3540b07f84f5e"
      GPS_STATEMENT_VERIFIER_ADDR:      "0x959922be3caee4b8cd9a407cc3ac1c251c2007b1"
    networks:
      - convoy-l1
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 6G

  # ═══ Phase 3.b — Per-swarm L2 sequencers (Madara α and Madara β) ════════
  # Two independent Madara instances, one per swarm, providing physical
  # separation between the Alpha and Bravo lanes. A compromise of one
  # sequencer cannot tamper with the other swarm's verdict.
  #
  # Both settle into the same L1 StarknetCoreStub at the deterministic
  # anvil[0]+nonce0 address (0x5FbDB2315678afecb367f032d93F642f64180aa3 —
  # see DeployL1.s.sol log). The stub is multi-tenant: messages from each
  # L2 are queued by destination address, and L1 consumers route by
  # mission_id/swarm_id in the payload.
  #
  # Each Madara hosts its own deployed convoy_protocol contract. The
  # contract source (cairo/convoy_protocol/src/lib.cairo) is identical,
  # so the same Sierra/CASM artefact is declared on both — they differ
  # only by storage state and chain_id.

  # ─── L1 → L2 bridge note (applies to both madaras) ─────────────────
  # We use `--l1-sync-disabled` even though Registry.deploy() correctly
  # emits a LogMessageToL2 event for open_mission. Tested 2026-06-18:
  # with `--l1-endpoint ws://ship-a:8546` (and http variant), Madara
  # v0.9.1 makes 0 RPC calls to L1 and never converts the L1 event into
  # an L1HandlerTransaction. The stub is presumably missing an interface
  # Madara introspects, or its zero-state (root=0, blockNumber=0) sits
  # below Madara's start-syncing threshold.
  # Runtime delivery of mission deployment falls back to
  # `scripts/open-missions.sh` which invokes open_mission_local on L2
  # directly. The L1 audit-trail (Registry storage + LogMessageToL2
  # event) remains intact via `scripts/register-missions.sh`.

  # ─── Alpha sequencer ───────────────────────────────────────────────
  madara-alpha:
    # Pinned to v0.10.0 — last release using cairo-lang-sierra-to-casm 2.12.3
    # (the OLD 2.x API). v0.10.1+ migrated to cairo-lang 1.0.0-alpha (the
    # rebranded next-gen Sierra compiler), which is incompatible with the
    # CASM format scarb 2.x produces. See cairo-builder/Dockerfile.
    image: ghcr.io/madara-alliance/madara:v0.9.1
    container_name: convoy-madara-alpha
    profiles: ["l2", "proving", "proving-direct"]
    depends_on:
      ship-a:
        condition: service_healthy
    labels: { dev.dozzle.group: "Alpha 1 (leader)" }
    volumes:
      - madara-alpha-data:/madara_db
    command: >
      --name MadaraAlpha
      --devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_alpha,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --rpc-external
      --rpc-cors all
      --feeder-gateway-enable
      --gateway-enable
      --gateway-external
      --gateway-port 8080
      --gateway-trusted-add-transaction-endpoint
      --l1-sync-disabled
      --no-transaction-validation
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports:
      # Alpha keeps the original host ports.
      - "19944:9944"  # StarkNet JSON-RPC  (host:19944)
      - "18080:8080"  # feeder-gateway     (host:18080)
    networks:
      - convoy-l1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ─── Bravo sequencer ───────────────────────────────────────────────
  madara-bravo:
    # Pinned to v0.10.0 — last release using cairo-lang-sierra-to-casm 2.12.3
    # (the OLD 2.x API). v0.10.1+ migrated to cairo-lang 1.0.0-alpha (the
    # rebranded next-gen Sierra compiler), which is incompatible with the
    # CASM format scarb 2.x produces. See cairo-builder/Dockerfile.
    image: ghcr.io/madara-alliance/madara:v0.9.1
    container_name: convoy-madara-bravo
    profiles: ["l2", "proving", "proving-direct"]
    depends_on:
      ship-a:
        condition: service_healthy
    labels: { dev.dozzle.group: "Bravo 1 (leader)" }
    volumes:
      - madara-bravo-data:/madara_db
    command: >
      --name MadaraBravo
      --devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_bravo,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --rpc-external
      --rpc-cors all
      --feeder-gateway-enable
      --gateway-enable
      --gateway-external
      --gateway-port 8080
      --gateway-trusted-add-transaction-endpoint
      --l1-sync-disabled
      --no-transaction-validation
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports:
      # Bravo on a separate host-port range so both sequencers expose
      # their RPC + feeder-gateway to the host simultaneously.
      - "29944:9944"  # StarkNet JSON-RPC  (host:29944)
      - "28080:8080"  # feeder-gateway     (host:28080)
    networks:
      - convoy-l1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ═══ Pathfinders — one onboard L2 node per drone ═══════════════════════
  # Each drone in the fleet runs its OWN Pathfinder indexer because each
  # drone is on different hardware in the field. Per swarm: 5 drones × 1
  # pathfinder each = 5 pathfinder containers. With 2 swarms that's 10
  # pathfinders total.
  #
  # Topology per the architecture diagram:
  #   pathfinder-{swarm}-1   ← LEADER drone (co-located with the swarm's
  #                            madara sequencer + snos + orchestrator +
  #                            prover-api on the same hardware). Same RPC
  #                            host port as the original single pathfinder
  #                            so existing scripts keep working.
  #   pathfinder-{swarm}-{2..5} ← FOLLOWER drones. Same config, just their
  #                              own data volume + port.
  #
  # All 5 in a swarm follow the SAME madara — they're parallel readers of
  # one sequencer chain. SNOS-α and orchestrator-α read from drone-1's
  # pathfinder (the leader's onboard node).
  #
  # Pinned to v0.21.3 — same version verifiable_grid uses, known compat
  # with madara :nightly + vg-snos.

  pathfinder-alpha-1:        # LEADER drone (co-located w/ madara/snos/orchestrator)
    <<: *pathfinder-alpha-template
    container_name: convoy-pathfinder-alpha-1
    volumes:
      - pathfinder-alpha-1-data:/usr/share/pathfinder/data
    ports: ["9545:9545"]
    labels: { dev.dozzle.group: "Alpha 1 (leader)" }

  # ── Follower drones (alpha 2..5) — Madara in --full mode ──────────────
  # Each follower runs a Madara full-node syncing from the swarm's leader
  # sequencer (madara-alpha). --l1-sync-disabled keeps them off L1 (they
  # don't settle anything), eliminating the noisy L1-sync WARN spam.

  madara-alpha-2:
    <<: *madara-fullnode-alpha-template
    container_name: convoy-madara-alpha-2
    volumes:
      - madara-alpha-2-data:/madara_db
    command: >
      --name MadaraAlphaDrone2
      --full
      --preset devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_alpha,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --gateway-url http://convoy-madara-alpha:8080
      --validate-then-forward-txs-to http://convoy-madara-alpha:8080
      --rpc-external
      --rpc-cors all
      --l1-sync-disabled
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports: ["19945:9944"]
    labels: { dev.dozzle.group: "Alpha 2" }

  madara-alpha-3:
    <<: *madara-fullnode-alpha-template
    container_name: convoy-madara-alpha-3
    volumes:
      - madara-alpha-3-data:/madara_db
    command: >
      --name MadaraAlphaDrone3
      --full
      --preset devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_alpha,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --gateway-url http://convoy-madara-alpha:8080
      --validate-then-forward-txs-to http://convoy-madara-alpha:8080
      --rpc-external
      --rpc-cors all
      --l1-sync-disabled
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports: ["19946:9944"]
    labels: { dev.dozzle.group: "Alpha 3" }

  madara-alpha-4:
    <<: *madara-fullnode-alpha-template
    container_name: convoy-madara-alpha-4
    volumes:
      - madara-alpha-4-data:/madara_db
    command: >
      --name MadaraAlphaDrone4
      --full
      --preset devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_alpha,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --gateway-url http://convoy-madara-alpha:8080
      --validate-then-forward-txs-to http://convoy-madara-alpha:8080
      --rpc-external
      --rpc-cors all
      --l1-sync-disabled
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports: ["19947:9944"]
    labels: { dev.dozzle.group: "Alpha 4" }

  madara-alpha-5:
    <<: *madara-fullnode-alpha-template
    container_name: convoy-madara-alpha-5
    volumes:
      - madara-alpha-5-data:/madara_db
    command: >
      --name MadaraAlphaDrone5
      --full
      --preset devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_alpha,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --gateway-url http://convoy-madara-alpha:8080
      --validate-then-forward-txs-to http://convoy-madara-alpha:8080
      --rpc-external
      --rpc-cors all
      --l1-sync-disabled
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports: ["19948:9944"]
    labels: { dev.dozzle.group: "Alpha 5" }

  pathfinder-bravo-1:        # LEADER drone (co-located w/ madara/snos/orchestrator)
    <<: *pathfinder-bravo-template
    container_name: convoy-pathfinder-bravo-1
    volumes:
      - pathfinder-bravo-1-data:/usr/share/pathfinder/data
    ports: ["9645:9545"]
    labels: { dev.dozzle.group: "Bravo 1 (leader)" }

  # ── Follower drones (bravo 2..5) — Madara in --full mode ──────────────
  madara-bravo-2:
    <<: *madara-fullnode-bravo-template
    container_name: convoy-madara-bravo-2
    volumes:
      - madara-bravo-2-data:/madara_db
    command: >
      --name MadaraBravoDrone2
      --full
      --preset devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_bravo,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --gateway-url http://convoy-madara-bravo:8080
      --validate-then-forward-txs-to http://convoy-madara-bravo:8080
      --rpc-external
      --rpc-cors all
      --l1-sync-disabled
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports: ["29945:9944"]
    labels: { dev.dozzle.group: "Bravo 2" }

  madara-bravo-3:
    <<: *madara-fullnode-bravo-template
    container_name: convoy-madara-bravo-3
    volumes:
      - madara-bravo-3-data:/madara_db
    command: >
      --name MadaraBravoDrone3
      --full
      --preset devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_bravo,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --gateway-url http://convoy-madara-bravo:8080
      --validate-then-forward-txs-to http://convoy-madara-bravo:8080
      --rpc-external
      --rpc-cors all
      --l1-sync-disabled
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports: ["29946:9944"]
    labels: { dev.dozzle.group: "Bravo 3" }

  madara-bravo-4:
    <<: *madara-fullnode-bravo-template
    container_name: convoy-madara-bravo-4
    volumes:
      - madara-bravo-4-data:/madara_db
    command: >
      --name MadaraBravoDrone4
      --full
      --preset devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_bravo,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --gateway-url http://convoy-madara-bravo:8080
      --validate-then-forward-txs-to http://convoy-madara-bravo:8080
      --rpc-external
      --rpc-cors all
      --l1-sync-disabled
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports: ["29947:9944"]
    labels: { dev.dozzle.group: "Bravo 4" }

  madara-bravo-5:
    <<: *madara-fullnode-bravo-template
    container_name: convoy-madara-bravo-5
    volumes:
      - madara-bravo-5-data:/madara_db
    command: >
      --name MadaraBravoDrone5
      --full
      --preset devnet
      --base-path /madara_db
      --chain-config-override=chain_id=convoy_bravo,eth_core_contract_address=0x5FbDB2315678afecb367f032d93F642f64180aa3,block_time=30s
      --gateway-url http://convoy-madara-bravo:8080
      --validate-then-forward-txs-to http://convoy-madara-bravo:8080
      --rpc-external
      --rpc-cors all
      --l1-sync-disabled
      --l1-gas-price 1000000000
      --blob-gas-price 100000
    ports: ["29948:9944"]
    labels: { dev.dozzle.group: "Bravo 5" }

  # ═══ Phase 3.c — SNOS PIE generators, one per swarm ══════════════════
  # Replays a Madara block in the Cairo VM, emits a PIE the prover consumes.
  # Each swarm has its own SNOS instance pinned to its swarm's pathfinder
  # + madara, so block replay traffic stays in-lane.

  snos-alpha:
    build:
      context: ./infrastructure/snos
      dockerfile: Dockerfile
    image: convoy-snos:latest
    container_name: convoy-snos-alpha
    labels: { dev.dozzle.group: "Alpha 1 (leader)" }
    profiles: ["proving-direct"]
    depends_on:
      pathfinder-alpha-1:                    # leader drone's onboard L2 node
        condition: service_healthy
    volumes:
      - snos-alpha-output:/output
      - ./infrastructure/snos/entrypoint.sh:/app/entrypoint.sh:ro
    environment:
      SWARM:             alpha
      SNOS_BLOCK_NUMBER: 1                    # which L2 block to prove
      SNOS_RPC_URL:      http://convoy-pathfinder-alpha-1:9545
      SNOS_GATEWAY_URL:  http://convoy-madara-alpha:8080
      SNOS_OUTPUT_DIR:   /output
    networks:
      - convoy-l1

  snos-bravo:
    image: convoy-snos:latest               # built once via snos-alpha
    container_name: convoy-snos-bravo
    labels: { dev.dozzle.group: "Bravo 1 (leader)" }
    profiles: ["proving-direct"]
    depends_on:
      pathfinder-bravo-1:                    # leader drone's onboard L2 node
        condition: service_healthy
      snos-alpha:                            # ensure image build completes first
        condition: service_started
    volumes:
      - snos-bravo-output:/output
      - ./infrastructure/snos/entrypoint.sh:/app/entrypoint.sh:ro
    environment:
      SWARM:             bravo
      SNOS_BLOCK_NUMBER: 1
      SNOS_RPC_URL:      http://convoy-pathfinder-bravo-1:9545
      SNOS_GATEWAY_URL:  http://convoy-madara-bravo:8080
      SNOS_OUTPUT_DIR:   /output
    networks:
      - convoy-l1

  # ═══ Phase 3.c — verifiable_grid-style orchestrator stack ════════════
  # MongoDB stores orchestrator job state; LocalStack mocks AWS S3/SQS/SNS;
  # vg-orchestrator pulls Madara blocks, calls SNOS to replay, calls a
  # mocked Atlantic prover service, and writes verdicts back to L1.
  # Same image + flags verifiable_grid uses, with addresses pointed at
  # OUR Phase 2 chain (Verifier at 0x9fE4…6e0).
  mongo:
    image: mongo:7
    container_name: convoy-mongo
    profiles: ["proving"]
    command: ["mongod"]
    networks:
      - convoy-l1
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  localstack:
    image: localstack/localstack:3
    container_name: convoy-localstack
    profiles: ["proving"]
    environment:
      # Orchestrator needs scheduler (EventBridge) for periodic worker
      # triggers; iam for role creation; events for the rule path.
      SERVICES: s3,sqs,sns,iam,events,scheduler,sts
      DEFAULT_REGION: us-east-1
      EDGE_PORT: 4566
      LOCALSTACK_HOST: convoy-localstack:4566
      SQS_ENDPOINT_STRATEGY: path
    networks:
      - convoy-l1
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ═══ Orchestrators — one per swarm ═══════════════════════════════════════
  # The Madara modular orchestrator pulls L2 blocks, calls SNOS to replay,
  # produces a STARK proof, and submits state updates + proofs to L1.
  #
  # In the dual-swarm topology each swarm has its own orchestrator pointing
  # at its own madara + pathfinder. They share the convoy-mongo and
  # convoy-localstack singletons via per-swarm namespacing:
  #   - MongoDB database: orchestrator_alpha vs orchestrator_bravo
  #   - SQS queue prefix: mo_alpha_{}_queue vs mo_bravo_{}_queue
  # so the two orchestrators never trample each other's job state.
  #
  # Settles into the same L1 StarknetCoreStub at
  # 0x5FbDB2315678afecb367f032d93F642f64180aa3 (per DeployL1.s.sol).
  # The stub is multi-tenant — each orchestrator signs with its swarm's
  # relay key (alpha=anvil[5]/ALPHA_RELAY, bravo=anvil[1]/BRAVO_RELAY).
  # The orchestrator command is taken verbatim from verifiable_grid with
  # these substitutions, and `--prover mock` + `--mock-atlantic-server`
  # skip the Atlantic HTTP API entirely for local dev. The Atlantic-*
  # flags are required by the CLI parser even though they're unused.

  orchestrator-alpha:
    image: ghcr.io/madara-alliance/orchestrator:nightly
    container_name: convoy-orchestrator-alpha
    labels: { dev.dozzle.group: "Alpha 1 (leader)" }
    profiles: ["proving"]
    depends_on:
      ship-a:
        condition: service_healthy
      madara-alpha:
        condition: service_healthy
      pathfinder-alpha-1:                    # leader drone's onboard L2 node
        condition: service_healthy
      mongo:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://convoy-localstack:4566
      RUST_LOG: "debug,hyper=info,reqwest=info,aws_smithy=info,h2=info,tower=info"
    command:
      - run
      - --aws
      - --aws-s3
      - --aws-sqs
      - --aws-sns
      - --mongodb
      - --mongodb-connection-url
      - mongodb://convoy-mongo:27017
      - --mongodb-database-name
      - orchestrator_alpha
      - --settle-on-ethereum
      - --da-on-ethereum
      - --ethereum-rpc-url
      - http://ship-a:8545
      - --ethereum-da-rpc-url
      - http://ship-a:8545
      - --ethereum-private-key
      - 8b3a350cf5c34c9194ca85829a2df0ec3153be0318b5e2d3348e872092edffba   # ALPHA_RELAY (anvil[5])
      - --l1-core-contract-address
      - "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      - --starknet-operator-address
      - "0x9965507D1a55bcC2695C58ba16FB37d819B0A4dc"                       # ALPHA_RELAY addr
      - --prover
      - mock
      - --atlantic-api-key
      - mock
      - --atlantic-service-url
      - http://localhost:4001
      - --atlantic-rpc-node-url
      - http://convoy-pathfinder-alpha-1:9545
      - --atlantic-prover-type
      - stone
      - --atlantic-settlement-layer
      - ethereum
      - --atlantic-verifier-contract-address
      - "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
      - --atlantic-verifier-cairo-vm
      - rust
      - --atlantic-verifier-result
      - proof-generation
      - --atlantic-network
      - TESTNET
      - --atlantic-mock-fact-hash
      - "true"
      - --mock-atlantic-server
      - --queue-identifier
      - "mo_alpha_{}_queue"
      - --min-block-to-process
      - "1"
      - --rpc-for-snos
      - http://convoy-pathfinder-alpha-1:9545
      - --madara-rpc-url
      - http://convoy-madara-alpha:9944
      - --madara-feeder-gateway-url
      - http://convoy-madara-alpha:8080/feeder_gateway
      - --replay-bounds-rpc-url
      - http://convoy-madara-alpha:9944
      - --max-batch-time-seconds
      - "300"
      - --max-batch-size
      - "10"
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - --admin-enabled
      - --disable-peerdas
    ports:
      - "13000:3000"          # alpha orchestrator API  (host:13000)
    networks:
      - convoy-l1
    restart: unless-stopped

  orchestrator-bravo:
    image: ghcr.io/madara-alliance/orchestrator:nightly
    container_name: convoy-orchestrator-bravo
    labels: { dev.dozzle.group: "Bravo 1 (leader)" }
    profiles: ["proving"]
    depends_on:
      ship-a:
        condition: service_healthy
      madara-bravo:
        condition: service_healthy
      pathfinder-bravo-1:                    # leader drone's onboard L2 node
        condition: service_healthy
      mongo:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://convoy-localstack:4566
      RUST_LOG: "debug,hyper=info,reqwest=info,aws_smithy=info,h2=info,tower=info"
    command:
      - run
      - --aws
      - --aws-s3
      - --aws-sqs
      - --aws-sns
      - --mongodb
      - --mongodb-connection-url
      - mongodb://convoy-mongo:27017
      - --mongodb-database-name
      - orchestrator_bravo
      - --settle-on-ethereum
      - --da-on-ethereum
      - --ethereum-rpc-url
      - http://ship-a:8545
      - --ethereum-da-rpc-url
      - http://ship-a:8545
      - --ethereum-private-key
      - 59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d   # BRAVO_RELAY (anvil[1])
      - --l1-core-contract-address
      - "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      - --starknet-operator-address
      - "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"                       # BRAVO_RELAY addr
      - --prover
      - mock
      - --atlantic-api-key
      - mock
      - --atlantic-service-url
      - http://localhost:4001
      - --atlantic-rpc-node-url
      - http://convoy-pathfinder-bravo-1:9545
      - --atlantic-prover-type
      - stone
      - --atlantic-settlement-layer
      - ethereum
      - --atlantic-verifier-contract-address
      - "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
      - --atlantic-verifier-cairo-vm
      - rust
      - --atlantic-verifier-result
      - proof-generation
      - --atlantic-network
      - TESTNET
      - --atlantic-mock-fact-hash
      - "true"
      - --mock-atlantic-server
      - --queue-identifier
      - "mo_bravo_{}_queue"
      - --min-block-to-process
      - "1"
      - --rpc-for-snos
      - http://convoy-pathfinder-bravo-1:9545
      - --madara-rpc-url
      - http://convoy-madara-bravo:9944
      - --madara-feeder-gateway-url
      - http://convoy-madara-bravo:8080/feeder_gateway
      - --replay-bounds-rpc-url
      - http://convoy-madara-bravo:9944
      - --max-batch-time-seconds
      - "300"
      - --max-batch-size
      - "10"
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - --admin-enabled
      - --disable-peerdas
    ports:
      - "13001:3000"          # bravo orchestrator API  (host:13001)
    networks:
      - convoy-l1
    restart: unless-stopped


volumes:
  prover-alpha-output:
    driver: local
  prover-bravo-output:
    driver: local
  madara-alpha-data:
    driver: local
  madara-bravo-data:
    driver: local
  # Leader pathfinders (one per swarm) — drone 1's archive node for SNOS
  pathfinder-alpha-1-data:
    driver: local
  pathfinder-bravo-1-data:
    driver: local
  # Follower Madara full-nodes (drones 2..5 per swarm)
  madara-alpha-2-data:
    driver: local
  madara-alpha-3-data:
    driver: local
  madara-alpha-4-data:
    driver: local
  madara-alpha-5-data:
    driver: local
  madara-bravo-2-data:
    driver: local
  madara-bravo-3-data:
    driver: local
  madara-bravo-4-data:
    driver: local
  madara-bravo-5-data:
    driver: local
  snos-alpha-output:
    driver: local
  snos-bravo-output:
    driver: local


# convoy-l1 network is created by docker-compose.l1.yml.
networks:
  convoy-l1:
    external: true
    name: convoy-l1
