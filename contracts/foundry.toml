# Foundry profile for Phase 2 — the four L1 contracts that drive the
# convoy mission protocol. Solidity + EVM target match versions.md.

[profile.default]
src              = "src"
test             = "test"
script           = "script"
out              = "out"
libs             = ["lib"]
cache_path       = "cache"
broadcast        = "broadcast"

# Multi-solc: our convoy contracts pin pragma ^0.8.20 (compile at 0.8.33),
# the vendored StarkWare evm-verifier under contracts/lib/starkex-contracts/
# pins pragma ^0.6.12. auto_detect_solc lets forge pick the matching
# compiler per-file based on each file's pragma directive. evm_version
# stays at "paris" because Geth v1.10.17 (our L1 target) cannot execute
# Shanghai (PUSH0) or later opcodes.
evm_version      = "paris"
optimizer        = true
optimizer_runs   = 200
auto_detect_solc = true
# viaIR routes through the new compilation pipeline. Required for
# Verifier.registerSafeProof which carries 5 calldata arrays + locals
# (exceeds the EVM stack-16 limit under the legacy codegen pipeline).
# Silently ignored by solc < 0.8.13 (i.e. the starkex 0.6.12 files);
# affects only our own 0.8.x sources.
via_ir           = true

# Verbose test output by default; gas snapshots help track regressions.
verbosity        = 2
gas_reports      = ["Verifier", "Registry", "CommandLog"]

# Include relative paths for clean error messages in CI.
fs_permissions   = [{ access = "read", path = "./out" }]

[fmt]
line_length      = 100
tab_width        = 4
bracket_spacing  = false
int_types        = "long"

[rpc_endpoints]
local            = "http://127.0.0.1:8545"

[etherscan]
# Local PoA chain — no etherscan, but the section is needed for `forge` to
# parse the toml without warnings.
